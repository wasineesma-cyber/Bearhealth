<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f1a"/>
      <stop offset="100%" style="stop-color:#1a0d2e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00f5cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Watch body -->
  <rect x="156" y="96" width="200" height="320" rx="48" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Watch band top -->
  <rect x="196" y="56" width="120" height="52" rx="16" fill="rgba(255,255,255,0.06)"/>
  <!-- Watch band bottom -->
  <rect x="196" y="404" width="120" height="52" rx="16" fill="rgba(255,255,255,0.06)"/>
  <!-- Recovery ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="12"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#ring)" stroke-width="12"
    stroke-dasharray="377" stroke-dashoffset="94" stroke-linecap="round"
    transform="rotate(-90 256 256)"/>
  <!-- Center score -->
  <text x="256" y="248" text-anchor="middle" fill="#00d4aa" font-family="system-ui,sans-serif" font-size="42" font-weight="700">74</text>
  <text x="256" y="276" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="18">recovery</text>
</svg>
